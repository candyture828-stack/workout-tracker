<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💪 Strength Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { background: #0f172a; }
    .screen { display: none; min-height: calc(100vh - 4rem); padding-bottom: 5.5rem; overflow-y: auto; }
    .screen.active { display: block; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .nav-item.active { color: #818cf8; }
    .exercise-card { border: 2px solid transparent; transition: border-color 0.15s, background 0.15s; }
    .exercise-card.selected { border-color: #6366f1; background: #1e1b4b; }

    /* Static exercise image */
    .ex-wrap { position: relative; aspect-ratio: 4/3; background: #1e293b; overflow: hidden; }
    .ex-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ex-wrap.failed img { display: none; }
    .ex-wrap .ex-label {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      color: #64748b; font-size: 11px; text-align: center; padding: 8px; line-height: 1.4;
    }
    .ex-wrap.failed .ex-label { display: flex; }

    /* Inline thumbnail in set-log header */
    .ex-thumb-wrap { width: 56px; height: 56px; border-radius: 10px; overflow: hidden; background: #1e293b; flex-shrink: 0; }
    .ex-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  </style>
</head>
<body class="text-white max-w-md mx-auto relative">

<!-- ── HOME ─────────────────────────────────────────────── -->
<div id="screen-home" class="screen active px-4 pt-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">💪 Strength Tracker</h1>
    <span id="today-date" class="text-gray-400 text-sm"></span>
  </div>

  <button onclick="startWorkout()"
    class="w-full bg-indigo-600 active:bg-indigo-700 text-white font-bold py-5 rounded-2xl text-lg mb-5">
    + Start Today's Workout
  </button>

  <div class="bg-gray-900 rounded-2xl p-4 mb-5">
    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Today's Body Weight</h2>
    <div class="flex gap-3">
      <input type="number" id="bw-quick" placeholder="kg" step="0.1"
        class="flex-1 bg-gray-800 rounded-xl px-4 py-3 text-white text-lg text-center outline-none focus:ring-2 focus:ring-indigo-500">
      <button onclick="quickLogWeight()"
        class="bg-indigo-600 active:bg-indigo-700 px-5 rounded-xl font-bold text-sm">Log</button>
    </div>
    <div id="bw-last-home" class="text-xs text-gray-500 mt-2 text-center"></div>
  </div>

  <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Recent Sessions</h2>
  <div id="recent-sessions" class="space-y-3"></div>
</div>

<!-- ── LOG ──────────────────────────────────────────────── -->
<div id="screen-log" class="screen px-4 pt-6">

  <!-- Step 1: Pick exercises -->
  <div id="log-step-pick">
    <div class="flex items-center gap-3 mb-2">
      <button onclick="showScreen('home')" class="text-gray-400 p-1">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 class="text-xl font-bold">Select Exercises</h1>
    </div>
    <p class="text-gray-400 text-sm mb-5 ml-9">Tap to select, tap again to deselect</p>

    <h3 class="text-xs font-semibold text-indigo-400 uppercase tracking-wide mb-3">🦵 Legs</h3>
    <div id="leg-exercises" class="grid grid-cols-2 gap-3 mb-5"></div>

    <h3 class="text-xs font-semibold text-indigo-400 uppercase tracking-wide mb-3">💪 Upper Body</h3>
    <div id="upper-exercises" class="grid grid-cols-2 gap-3 mb-5"></div>

    <div id="pick-summary" class="text-center text-sm text-gray-400 mb-3"></div>
    <button id="start-log-btn" onclick="startLogging()"
      class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl text-lg mb-6 opacity-40 cursor-not-allowed"
      disabled>
      Start Logging →
    </button>
  </div>

  <!-- Step 2: Log sets -->
  <div id="log-step-sets" style="display:none">
    <div class="flex items-center gap-3 mb-5">
      <button onclick="backToPick()" class="text-gray-400 p-1">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 class="text-xl font-bold">Log Sets</h1>
    </div>
    <div id="exercise-set-cards" class="space-y-4 mb-5"></div>
    <button onclick="saveWorkout()"
      class="w-full bg-green-600 active:bg-green-700 text-white font-bold py-4 rounded-2xl text-lg mb-6">
      ✅ Save Workout
    </button>
  </div>
</div>

<!-- ── WEIGHT ─────────────────────────────────────────────── -->
<div id="screen-weight" class="screen px-4 pt-6">
  <h1 class="text-2xl font-bold mb-5">⚖️ Body Weight</h1>

  <div class="bg-gray-900 rounded-2xl p-4 mb-5">
    <div class="flex gap-2">
      <input type="date" id="bw-date"
        class="flex-1 bg-gray-800 rounded-xl px-3 py-3 text-white text-sm outline-none focus:ring-2 focus:ring-indigo-500">
      <input type="number" id="bw-weight" placeholder="kg" step="0.1"
        class="w-20 bg-gray-800 rounded-xl px-2 py-3 text-white text-center outline-none focus:ring-2 focus:ring-indigo-500">
      <button onclick="addWeight()"
        class="bg-indigo-600 active:bg-indigo-700 px-4 rounded-xl font-bold">＋</button>
    </div>
  </div>

  <div class="bg-gray-900 rounded-2xl p-4 mb-5">
    <div id="weight-chart-wrap"><canvas id="weight-chart"></canvas></div>
    <div id="weight-chart-empty" class="text-center text-gray-500 text-sm py-6 hidden">Log 2+ entries to see the chart</div>
  </div>

  <div id="weight-list" class="space-y-2"></div>
</div>

<!-- ── HISTORY ─────────────────────────────────────────────── -->
<div id="screen-history" class="screen px-4 pt-6">
  <h1 class="text-2xl font-bold mb-5">📋 History</h1>
  <div id="history-list" class="space-y-4"></div>
</div>

<!-- ── TIPS ──────────────────────────────────────────────── -->
<div id="screen-tips" class="screen px-4 pt-6">
  <div class="flex items-center gap-3 mb-5">
    <button onclick="showScreen('log')" class="text-gray-400 p-1">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <h1 class="text-xl font-bold">Exercise Tips <span class="text-gray-500 font-normal text-base">運動提示</span></h1>
  </div>
  <div id="tips-content"></div>
</div>

<!-- ── ACTION SHEET ───────────────────────────────────────── -->
<div id="modal-action" class="hidden fixed inset-0 z-50 flex items-end max-w-md mx-auto">
  <div class="absolute inset-0 bg-black/60" onclick="closeModal()"></div>
  <div class="relative w-full bg-gray-900 rounded-t-3xl p-5 pb-8">
    <div class="flex items-center gap-4 mb-5">
      <div class="ex-thumb-wrap"><img id="modal-img" src="" alt="" onerror="this.style.display='none'"></div>
      <div>
        <div id="modal-zh" class="font-bold text-lg leading-tight"></div>
        <div id="modal-en" class="text-gray-400 text-sm mt-0.5"></div>
      </div>
    </div>
    <button id="modal-tips-btn" onclick="goToTips()"
      class="w-full bg-indigo-950 border border-indigo-800 text-indigo-300 font-semibold py-4 rounded-2xl mb-3 flex items-center gap-3 px-5">
      <span class="text-xl">💡</span>
      <span>Tips <span class="text-indigo-500 font-normal text-sm">運動提示</span></span>
    </button>
    <button id="modal-log-btn" onclick="modalToggleExercise()"
      class="w-full bg-green-950 border border-green-800 text-green-300 font-semibold py-4 rounded-2xl flex items-center gap-3 px-5">
      <span class="text-xl">✏️</span>
      <span id="modal-log-label">Add to Workout <span class="text-green-500 font-normal text-sm">加入訓練</span></span>
    </button>
    <button onclick="closeModal()" class="w-full text-gray-500 py-3 mt-1 text-sm">Cancel</button>
  </div>
</div>

<!-- ── BOTTOM NAV ─────────────────────────────────────────── -->
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-gray-900 border-t border-gray-800 flex z-50">
  <button onclick="showScreen('home')" class="nav-item flex-1 flex flex-col items-center py-3 text-gray-500 text-xs gap-1" data-screen="home">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
    </svg>
    Home
  </button>
  <button onclick="showScreen('log')" class="nav-item flex-1 flex flex-col items-center py-3 text-gray-500 text-xs gap-1" data-screen="log">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
    </svg>
    Log
  </button>
  <button onclick="showScreen('weight')" class="nav-item flex-1 flex flex-col items-center py-3 text-gray-500 text-xs gap-1" data-screen="weight">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
    </svg>
    Weight
  </button>
  <button onclick="showScreen('history')" class="nav-item flex-1 flex flex-col items-center py-3 text-gray-500 text-xs gap-1" data-screen="history">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    History
  </button>
</nav>

<script>
const IMG = 'https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/';

const EXERCISES = [
  // LEGS
  {
    id:'backsquat', en:'Back Squat', zh:'背槓深蹲', muscle:'legs', img:'Barbell_Squat',
    tips:[
      { en:'Feet shoulder-width apart, toes turned slightly out (15–30°).', zh:'雙腳與肩同寬，腳尖略向外轉（15–30度）。' },
      { en:'Brace your core and take a big breath before descending — hold it until you\'re back up.', zh:'下蹲前先收緊核心並深吸一口氣，直到站回頂部再吐氣。' },
      { en:'Break at the hips and knees simultaneously; push your knees out in line with your toes.', zh:'髖部與膝蓋同時啟動，膝蓋向外推對齊腳尖方向，不要內夾。' },
      { en:'Aim for at least parallel (thighs parallel to floor) — go deeper if mobility allows.', zh:'至少蹲到大腿與地面平行，若柔軟度允許可蹲更深。' },
      { en:'Drive through the mid-foot and think "push the floor away" on the way up.', zh:'站起時重心落在腳掌中央，想像「把地板推開」。' },
      { en:'Keep your chest up; if your torso collapses forward, the weight is too heavy.', zh:'保持胸部挺起；若上身前傾塌陷，代表重量過重或上背力量不足。' },
    ]
  },
  {
    id:'hacksquat', en:'Hack Squat', zh:'哈客深蹲', muscle:'legs', img:'Barbell_Hack_Squat',
    tips:[
      { en:'Foot placement higher on the platform reduces knee stress; lower increases quad range.', zh:'腳放高一點可減少膝蓋壓力；放低一點則增加股四頭的活動範圍。' },
      { en:'Keep your lower back pressed firmly against the pad throughout the movement.', zh:'整個動作過程中，下背要緊貼靠墊，不要離開。' },
      { en:'Push your knees out — don\'t let them cave inward.', zh:'膝蓋向外推，不要內扣。' },
      { en:'Don\'t lock out your knees at the top; keep a slight bend to maintain tension.', zh:'頂部不要完全鎖死膝蓋，保持微彎以維持肌肉張力。' },
      { en:'Control the descent — don\'t let the sled crash down.', zh:'控制下降速度，不要讓重量自由落下。' },
      { en:'Pause briefly at the bottom for maximum quad stretch.', zh:'底部稍作停頓，讓股四頭獲得最大伸展。' },
    ]
  },
  {
    id:'splitsquat', en:'Split Squat', zh:'分腿蹲', muscle:'legs', img:'Barbell_Side_Split_Squat',
    tips:[
      { en:'Take a long enough stride so your front shin stays vertical when your rear knee nears the floor.', zh:'步伐要夠大，後膝接近地面時前小腿應保持垂直。' },
      { en:'Lower your rear knee straight down — don\'t let it swing forward.', zh:'後膝直直往下沉，不要向前擺動。' },
      { en:'Drive through the heel of your front foot to stand; the front leg does the work.', zh:'用前腳跟發力站起，前腳是主要用力的腿。' },
      { en:'Keep your torso upright throughout — don\'t lean heavily forward.', zh:'全程保持上身直立，不要過度前傾。' },
      { en:'Both hips should face forward; avoid rotating toward the front leg.', zh:'雙側髖部保持朝前，避免向前腳方向旋轉。' },
      { en:'If your front knee drifts inward, slow down and reduce the weight.', zh:'若前膝往內偏移，請放慢速度並減輕重量。' },
    ]
  },
  {
    id:'stepup', en:'Step Up', zh:'單腳登階', muscle:'legs', img:'Barbell_Step_Ups',
    tips:[
      { en:'Step height should place your knee at roughly 90° when your foot is on the box.', zh:'台階高度應使腳踩上去時膝蓋呈約90度角。' },
      { en:'Press through the heel of the working leg — not the toe.', zh:'用工作腿的腳跟發力往上踩，不是腳尖。' },
      { en:'Do NOT push off the back foot; the trailing leg is just for balance.', zh:'不要用後腳借力；後腿僅用於維持平衡。' },
      { en:'Fully extend the working leg at the top before stepping back down.', zh:'站到頂部時將工作腿完全伸直，再慢慢下來。' },
      { en:'Control the descent slowly for extra time under tension.', zh:'緩慢控制下降，增加肌肉的張力時間。' },
      { en:'Keep your hips level and torso tall — don\'t let your hip hike or drop.', zh:'保持髖部水平、上身直立，不要讓任一側髖部升高或下沉。' },
    ]
  },
  {
    id:'rdl', en:'Barbell RDL', zh:'槓鈴 RDL', muscle:'legs', img:'Romanian_Deadlift',
    tips:[
      { en:'This is a hip hinge, not a squat — maintain a slight, fixed knee bend throughout.', zh:'這是髖鉸鏈動作，不是深蹲——全程保持膝蓋微彎且固定不變。' },
      { en:'Push your hips back as the bar travels down; keep the bar close to your thighs and shins.', zh:'槓下移時將髖部往後推；槓始終貼近大腿和小腿。' },
      { en:'Stop when you feel a strong hamstring stretch (usually mid-shin) — going lower with a rounded back defeats the purpose.', zh:'感受到大腿後側強烈伸展時停止（通常約小腿中段）——弓背繼續下放會失去意義。' },
      { en:'Keep your spine neutral from head to tailbone — no rounding the lower back.', zh:'從頭到尾骨保持脊椎中立，下背不要拱起。' },
      { en:'Squeeze your glutes hard at the top to fully extend your hips.', zh:'頂部用力夾緊臀部，確保髖部完全伸展。' },
      { en:'Shoulders should stay directly over or slightly in front of the bar at the bottom.', zh:'底部時肩膀應保持在槓的正上方或略微偏前。' },
    ]
  },
  {
    id:'bstance', en:'B-Stance Weighted Deadlift', zh:'B Stance 對側負重硬舉', muscle:'legs', img:'Stiff_Leg_Barbell_Good_Morning',
    tips:[
      { en:'The back foot is a kickstand only — place just your toes for balance, not for loading.', zh:'後腳只是平衡支撐，僅腳尖輕碰地面，不承受重量。' },
      { en:'About 90% of the load should be on the front (working) leg.', zh:'約90%的負荷應由前腳（工作腿）承擔。' },
      { en:'Hinge at the hip exactly like an RDL: spine neutral, weight close to body.', zh:'和RDL一樣進行髖鉸鏈：脊椎中立，重量貼近身體。' },
      { en:'Feel the stretch primarily in the hamstring of the front leg.', zh:'主要感受前腿大腿後側的伸展。' },
      { en:'Great for identifying and correcting left–right strength imbalances.', zh:'非常適合發現並改善左右腿的力量不均衡。' },
      { en:'If balance is challenging, start with a dumbbell in the opposite hand.', zh:'若平衡困難，可先從對側手持啞鈴開始練習。' },
    ]
  },
  // UPPER
  {
    id:'chestpress', en:'Dumbbell / Machine Chest Press', zh:'啞鈴・機械胸推', muscle:'upper', img:'Dumbbell_Bench_Press',
    tips:[
      { en:'Retract and depress your shoulder blades into the bench — this creates a stable, safe base.', zh:'將肩胛骨往後收攏並下壓貼緊椅背，建立穩定安全的支撐基礎。' },
      { en:'Lower the weight to mid-chest with elbows at 45–75° from your torso (not flared straight out).', zh:'將重量降至胸部中段，手肘與身體呈45–75度角（不要完全外展）。' },
      { en:'Don\'t let elbows flare to 90° — this puts unnecessary strain on the shoulder joint.', zh:'不要讓手肘外展至90度，這會對肩關節造成不必要的壓力。' },
      { en:'Press up and very slightly inward, squeezing the chest at the top.', zh:'往上並微微向內推，在頂部夾緊胸肌。' },
      { en:'Control the descent — aim for 2 seconds down.', zh:'控制下降速度，目標約2秒。' },
      { en:'Keep feet flat on the floor and drive them into the ground for full-body stability.', zh:'雙腳平踩地面並向下踩穩，建立全身穩定性。' },
    ]
  },
  {
    id:'incline', en:'Barbell / Dumbbell Incline Press', zh:'槓鈴・啞鈴上胸推', muscle:'upper', img:'Barbell_Incline_Bench_Press_-_Medium_Grip',
    tips:[
      { en:'Set bench angle between 30–45°; steeper shifts work to front deltoids instead of upper chest.', zh:'椅背角度設在30–45度之間；角度太陡會讓前三角肌取代上胸發力。' },
      { en:'Lower the bar or dumbbells to your upper chest — not your lower chest.', zh:'將槓或啞鈴降至上胸位置，而非下胸。' },
      { en:'Keep your shoulder blades retracted and chest tall throughout.', zh:'全程保持肩胛骨收攏、胸部挺起。' },
      { en:'Elbows travel at about 45–60° from your torso — not flared straight out.', zh:'手肘應與身體呈45–60度角，不要完全外展。' },
      { en:'Think about pushing the ceiling away, not just the bar.', zh:'想像把天花板推開，而不只是推槓。' },
      { en:'A slight lower-back arch is natural; excessive arch reduces chest range of motion.', zh:'下背輕微拱起是自然的；但過度拱背反而會縮小胸肌的活動範圍。' },
    ]
  },
  {
    id:'cablerow', en:'Cable Row', zh:'Cable 划船', muscle:'upper', img:'Seated_Cable_Rows',
    tips:[
      { en:'Sit tall with a proud chest — don\'t round your lower back.', zh:'坐直挺胸，不要駝背或圓腰。' },
      { en:'Initiate the pull by depressing your shoulder blades first, then bend the elbows.', zh:'先將肩胛骨往下壓並收攏，再彎曲手肘完成拉動。' },
      { en:'Squeeze your shoulder blades together hard at peak contraction — hold for 1 second.', zh:'在最大收縮時用力夾緊肩胛骨，保持1秒。' },
      { en:'Avoid excessive forward lean on the return; a slight lean is okay.', zh:'回程時避免過度前傾；輕微前傾是可以接受的。' },
      { en:'Control the stretch forward slowly — feel your lats and rhomboids lengthen.', zh:'緩慢控制向前伸展，感受背闊肌與菱形肌的延伸。' },
      { en:'Elbows should stay close to your sides, not flaring outward.', zh:'手肘應貼近身體兩側，不要向外張開。' },
    ]
  },
  {
    id:'shoulderpress', en:'Dumbbell / Machine Shoulder Press', zh:'啞鈴・機械肩推', muscle:'upper', img:'Dumbbell_Shoulder_Press',
    tips:[
      { en:'Position elbows slightly in front of your body (not directly to the side) to protect the shoulder.', zh:'手肘稍微位於身體前方（不要完全側展），以保護肩關節。' },
      { en:'Brace your core and avoid arching your lower back as you press overhead.', zh:'收緊核心，推舉時避免下背過度拱起。' },
      { en:'Press directly overhead until arms are nearly fully extended.', zh:'直接往頭頂推舉，直到手臂近乎完全伸直。' },
      { en:'Lower dumbbells to ear level only — no lower — to keep tension on the deltoids.', zh:'啞鈴降至耳朵高度即可，不要再低，以維持三角肌張力。' },
      { en:'Keep wrists stacked over elbows at all times.', zh:'全程保持手腕在手肘正上方。' },
      { en:'Don\'t use leg drive unless intentionally performing a push press.', zh:'除非刻意做推舉（push press），否則不要用腿部借力。' },
    ]
  },
  {
    id:'straightarm', en:'Straight Arm Pulldown', zh:'直臂下壓', muscle:'upper', img:'Straight-Arm_Pulldown',
    tips:[
      { en:'Keep arms straight with just a very slight soft elbow — no bending throughout the rep.', zh:'手臂全程保持伸直，只允許非常輕微的軟肘，不可彎曲。' },
      { en:'Lean forward slightly from the hips (about 15–20°) for better range of motion.', zh:'從髖部輕微前傾（約15–20度），以獲得更大的活動範圍。' },
      { en:'Think "drive elbows down and back toward your hips" — not just pushing the bar down.', zh:'想著「把手肘往下、往後推向髖部」，而不只是把槓往下壓。' },
      { en:'You should feel this in your lats, not triceps. If triceps fire, check your elbows aren\'t bending.', zh:'應感受到背闊肌深處發力，而非三頭肌。若感覺三頭肌用力，請確認手肘是否彎曲。' },
      { en:'Control the return to full overhead extension for maximum lat stretch.', zh:'回程控制至手臂完全上舉，讓背闊肌獲得最大伸展。' },
      { en:'Isolation exercise — use a weight that lets you feel the muscle, not ego-lift.', zh:'這是孤立動作，使用能感受到肌肉的重量，不要逞強加重。' },
    ]
  },
  {
    id:'pulldown', en:'Cable Lat Pulldown', zh:'滑輪下拉', muscle:'upper', img:'Wide-Grip_Lat_Pulldown',
    tips:[
      { en:'Lean back slightly (about 10–15°) — not excessively.', zh:'略微後傾（約10–15度），不要過度後仰。' },
      { en:'Before pulling, depress your shoulder blades — pull shoulders down away from your ears first.', zh:'拉之前先將肩胛骨下壓，把肩膀往下遠離耳朵。' },
      { en:'Pull the bar to your upper chest — never behind your neck.', zh:'將槓拉至上胸位置，絕對不要拉到頸後。' },
      { en:'Think "elbows to back pockets" to fully engage the lats.', zh:'想著「把手肘往後褲袋方向拉」，以充分啟動背闊肌。' },
      { en:'Control the return slowly — the stretch at the top builds lat length over time.', zh:'緩慢控制回程，頂部的伸展能長期增加背闊肌的長度。' },
      { en:'Avoid momentum or excessive body swing to move the weight.', zh:'避免利用慣性或過度晃動身體來移動重量。' },
    ]
  },
];

// ── STORAGE ───────────────────────────────────────────────
const DB = {
  getSessions:  () => JSON.parse(localStorage.getItem('st_sessions')    || '[]'),
  saveSessions: v  => localStorage.setItem('st_sessions',    JSON.stringify(v)),
  getWeights:   () => JSON.parse(localStorage.getItem('st_bodyweights') || '[]'),
  saveWeights:  v  => localStorage.setItem('st_bodyweights', JSON.stringify(v)),
};

let selectedExercises = [];
let weightChart = null;

// ── NAVIGATION ────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelector(`.nav-item[data-screen="${name}"]`)?.classList.add('active');
  if (name === 'home')    renderHome();
  if (name === 'weight')  renderWeightScreen();
  if (name === 'history') renderHistory();
  if (name === 'log')     renderPicker();
}

// ── EXERCISE IMAGE HELPER ─────────────────────────────────
function exWrap(e) {
  return `
    <div class="ex-wrap" id="wrap-${e.id}">
      <img src="${IMG}${e.img}/0.jpg" alt="${e.en}"
           onerror="document.getElementById('wrap-${e.id}').classList.add('failed')">
      <div class="ex-label">${e.zh}<br><span style="color:#475569;font-size:10px">${e.en}</span></div>
    </div>`;
}

function thumbWrap(e) {
  return `
    <div class="ex-thumb-wrap">
      <img src="${IMG}${e.img}/0.jpg" alt="${e.en}" onerror="this.style.display='none'">
    </div>`;
}

// ── HOME ──────────────────────────────────────────────────
function renderHome() {
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

  const weights = DB.getWeights();
  const lastBw  = weights.length ? weights[weights.length - 1] : null;
  document.getElementById('bw-last-home').textContent =
    lastBw ? `Last logged: ${lastBw.weight} kg (${lastBw.date})` : '';

  const sessions = DB.getSessions().slice(-5).reverse();
  const el = document.getElementById('recent-sessions');
  if (!sessions.length) {
    el.innerHTML = '<p class="text-gray-500 text-sm text-center py-8">No sessions yet — start your first workout!</p>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="bg-gray-900 rounded-2xl p-4">
      <div class="flex justify-between items-center mb-1">
        <span class="font-semibold">${s.date}</span>
        <span class="text-xs text-gray-400">${s.exercises.length} exercises</span>
      </div>
      <div class="text-sm text-gray-400">${s.exercises.map(e => e.zh).join(' · ')}</div>
    </div>`).join('');
}

function quickLogWeight() {
  const val = parseFloat(document.getElementById('bw-quick').value);
  if (!val || val <= 0) return;
  saveWeightEntry(new Date().toISOString().split('T')[0], val);
  document.getElementById('bw-quick').value = '';
  renderHome();
  showToast('Body weight logged ✅');
}

// ── EXERCISE PICKER ───────────────────────────────────────
function startWorkout() {
  selectedExercises = [];
  showScreen('log');
}

function renderPicker() {
  const legs  = EXERCISES.filter(e => e.muscle === 'legs');
  const upper = EXERCISES.filter(e => e.muscle === 'upper');
  document.getElementById('leg-exercises').innerHTML   = legs.map(exerciseCard).join('');
  document.getElementById('upper-exercises').innerHTML = upper.map(exerciseCard).join('');
  document.getElementById('log-step-pick').style.display = 'block';
  document.getElementById('log-step-sets').style.display = 'none';
  updatePickSummary();
}

function exerciseCard(e) {
  const sel = selectedExercises.some(s => s.id === e.id);
  return `
    <div class="exercise-card ${sel ? 'selected' : ''} bg-gray-900 rounded-2xl overflow-hidden cursor-pointer">
      <div class="relative" onclick="openActionSheet('${e.id}')">
        ${exWrap(e)}
        ${sel ? '<div class="absolute top-2 right-2 bg-indigo-600 rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shadow z-10">✓</div>' : ''}
      </div>
      <div class="p-2" onclick="openActionSheet('${e.id}')">
        <div class="font-semibold text-sm leading-tight">${e.zh}</div>
        <div class="text-xs text-gray-400 mt-0.5">${e.en}</div>
      </div>
    </div>`;
}

function toggleExercise(id) {
  const ex  = EXERCISES.find(e => e.id === id);
  const idx = selectedExercises.findIndex(e => e.id === id);
  if (idx > -1) selectedExercises.splice(idx, 1);
  else selectedExercises.push(ex);
  renderPicker();
}

// ── ACTION SHEET ──────────────────────────────────────────
let _modalId = null;

function openActionSheet(id) {
  const e = EXERCISES.find(ex => ex.id === id);
  _modalId = id;
  document.getElementById('modal-img').src = `${IMG}${e.img}/0.jpg`;
  document.getElementById('modal-zh').textContent = e.zh;
  document.getElementById('modal-en').textContent = e.en;
  const sel = selectedExercises.some(s => s.id === id);
  document.getElementById('modal-log-label').innerHTML = sel
    ? 'Remove from Workout <span class="text-green-500 font-normal text-sm">移除</span>'
    : 'Add to Workout <span class="text-green-500 font-normal text-sm">加入訓練</span>';
  document.getElementById('modal-action').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-action').classList.add('hidden');
  _modalId = null;
}

function goToTips() {
  const id = _modalId;
  closeModal();
  showTipsScreen(id);
}

function modalToggleExercise() {
  const id = _modalId;
  closeModal();
  toggleExercise(id);
}

// ── TIPS SCREEN ───────────────────────────────────────────
function showTipsScreen(id) {
  const e = EXERCISES.find(ex => ex.id === id);
  document.getElementById('tips-content').innerHTML = `
    <div class="flex items-center gap-4 mb-6">
      <div class="ex-thumb-wrap w-20 h-20 rounded-2xl flex-shrink-0" style="width:80px;height:80px;border-radius:16px">
        <img src="${IMG}${e.img}/0.jpg" alt="${e.en}" onerror="this.style.display='none'"
             style="width:100%;height:100%;object-fit:cover;display:block;border-radius:16px">
      </div>
      <div>
        <h2 class="text-xl font-bold leading-tight">${e.zh}</h2>
        <p class="text-gray-400 text-sm mt-0.5">${e.en}</p>
      </div>
    </div>
    <div class="space-y-3 mb-6">
      ${e.tips.map((tip, i) => `
        <div class="bg-gray-900 rounded-2xl p-4 flex gap-3">
          <span class="text-indigo-400 font-bold text-sm flex-shrink-0 mt-0.5">${i + 1}</span>
          <div>
            <p class="text-gray-200 text-sm leading-relaxed">${tip.en}</p>
            <p class="text-gray-500 text-xs leading-relaxed mt-1">${tip.zh}</p>
          </div>
        </div>`).join('')}
    </div>
    <button onclick="showScreen('log')"
      class="w-full bg-indigo-600 active:bg-indigo-700 text-white font-bold py-4 rounded-2xl text-base">
      ← Back to Exercises
    </button>`;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-tips').classList.add('active');
}

function updatePickSummary() {
  const total = selectedExercises.length;
  const ready = total >= 1;
  const btn = document.getElementById('start-log-btn');
  const sum = document.getElementById('pick-summary');
  sum.textContent = total ? `${total} exercise${total > 1 ? 's' : ''} selected` : 'Select at least 1 exercise';
  sum.className   = `text-center text-sm mb-3 ${ready ? 'text-green-400' : 'text-gray-400'}`;
  btn.disabled    = !ready;
  btn.classList.toggle('opacity-40', !ready);
  btn.classList.toggle('cursor-not-allowed', !ready);
}

// ── SET LOGGING ───────────────────────────────────────────
function startLogging() {
  document.getElementById('log-step-pick').style.display = 'none';
  document.getElementById('log-step-sets').style.display = 'block';

  document.getElementById('exercise-set-cards').innerHTML = selectedExercises.map(e => `
    <div class="bg-gray-900 rounded-2xl overflow-hidden">
      <div class="flex items-center gap-3 p-3 border-b border-gray-800">
        ${thumbWrap(e)}
        <div>
          <div class="font-semibold">${e.zh}</div>
          <div class="text-xs text-gray-400">${e.en}</div>
        </div>
      </div>
      <div class="p-3">
        <div class="grid grid-cols-3 gap-2 text-xs text-gray-500 text-center mb-2">
          <span>Set</span><span>Reps</span><span>Weight (kg)</span>
        </div>
        ${[1,2,3].map(i => `
          <div class="grid grid-cols-3 gap-2 mb-2">
            <div class="bg-gray-800 rounded-xl py-2.5 text-center text-sm font-bold text-indigo-400">Set ${i}</div>
            <input type="number" id="${e.id}-reps-${i}" placeholder="reps" min="0"
              class="bg-gray-800 rounded-xl py-2.5 text-center text-sm outline-none focus:ring-2 focus:ring-indigo-500 w-full">
            <input type="number" id="${e.id}-kg-${i}" placeholder="kg" min="0" step="0.5"
              class="bg-gray-800 rounded-xl py-2.5 text-center text-sm outline-none focus:ring-2 focus:ring-indigo-500 w-full">
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function backToPick() {
  document.getElementById('log-step-pick').style.display = 'block';
  document.getElementById('log-step-sets').style.display = 'none';
}

function saveWorkout() {
  const date = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
  const session = {
    date,
    timestamp: Date.now(),
    exercises: selectedExercises.map(e => ({
      id: e.id, en: e.en, zh: e.zh,
      sets: [1,2,3].map(i => ({
        reps:   parseInt(document.getElementById(`${e.id}-reps-${i}`)?.value)   || 0,
        weight: parseFloat(document.getElementById(`${e.id}-kg-${i}`)?.value) || 0,
      }))
    }))
  };
  const sessions = DB.getSessions();
  sessions.push(session);
  DB.saveSessions(sessions);
  selectedExercises = [];
  showToast('Workout saved 🎉');
  showScreen('home');
}

// ── BODY WEIGHT ───────────────────────────────────────────
function renderWeightScreen() {
  document.getElementById('bw-date').value = new Date().toISOString().split('T')[0];

  const weights = DB.getWeights().sort((a, b) => a.date.localeCompare(b.date));
  const wrap    = document.getElementById('weight-chart-wrap');
  const empty   = document.getElementById('weight-chart-empty');

  if (weights.length < 2) {
    wrap.style.display = 'none';
    empty.classList.remove('hidden');
  } else {
    wrap.style.display = 'block';
    empty.classList.add('hidden');
    if (weightChart) weightChart.destroy();
    const recent = weights.slice(-20);
    weightChart = new Chart(document.getElementById('weight-chart').getContext('2d'), {
      type: 'line',
      data: {
        labels: recent.map(b => b.date.slice(5)),
        datasets: [{
          data: recent.map(b => b.weight),
          borderColor: '#6366f1',
          backgroundColor: 'rgba(99,102,241,0.12)',
          tension: 0.3, fill: true,
          pointBackgroundColor: '#6366f1', pointRadius: 4,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color:'#94a3b8', font:{size:11} }, grid: { color:'#1e293b' } },
          y: { ticks: { color:'#94a3b8', font:{size:11} }, grid: { color:'#1e293b' } }
        }
      }
    });
  }

  document.getElementById('weight-list').innerHTML =
    weights.slice().reverse().slice(0, 15).map(b => `
      <div class="flex justify-between items-center bg-gray-900 rounded-xl px-4 py-3">
        <span class="text-gray-300 text-sm">${b.date}</span>
        <div class="flex items-center gap-4">
          <span class="font-bold">${b.weight} <span class="text-gray-400 text-sm font-normal">kg</span></span>
          <button onclick="deleteWeight('${b.date}')" class="text-gray-600 hover:text-red-400 text-xs">✕</button>
        </div>
      </div>`).join('')
    || '<p class="text-gray-500 text-sm text-center py-8">No weight entries yet</p>';
}

function addWeight() {
  const date   = document.getElementById('bw-date').value;
  const weight = parseFloat(document.getElementById('bw-weight').value);
  if (!date || !weight || weight <= 0) return;
  saveWeightEntry(date, weight);
  document.getElementById('bw-weight').value = '';
  renderWeightScreen();
}

function saveWeightEntry(date, weight) {
  const weights = DB.getWeights();
  const idx = weights.findIndex(b => b.date === date);
  if (idx > -1) weights[idx].weight = weight;
  else weights.push({ date, weight });
  DB.saveWeights(weights);
}

function deleteWeight(date) {
  DB.saveWeights(DB.getWeights().filter(b => b.date !== date));
  renderWeightScreen();
}

// ── HISTORY ───────────────────────────────────────────────
function renderHistory() {
  const sessions = DB.getSessions().slice().reverse();
  const el = document.getElementById('history-list');
  if (!sessions.length) {
    el.innerHTML = '<p class="text-gray-500 text-sm text-center py-10">No sessions yet</p>';
    return;
  }
  el.innerHTML = sessions.map((s, i) => `
    <div class="bg-gray-900 rounded-2xl overflow-hidden">
      <button onclick="toggleHistory(${i})" class="w-full flex justify-between items-center p-4 text-left">
        <div>
          <div class="font-semibold">${s.date}</div>
          <div class="text-sm text-gray-400 mt-0.5">${s.exercises.map(e => e.zh).join(' · ')}</div>
        </div>
        <svg id="hist-arrow-${i}" class="w-5 h-5 text-gray-500 transition-transform flex-shrink-0"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div id="hist-detail-${i}" class="hidden border-t border-gray-800 p-4 space-y-4">
        ${s.exercises.map(e => `
          <div>
            <div class="text-sm font-semibold mb-2">
              ${e.zh} <span class="text-gray-500 font-normal text-xs">${e.en}</span>
            </div>
            ${e.sets.map((set, j) => `
              <div class="flex gap-4 text-sm text-gray-300 ml-2 mb-1">
                <span class="text-indigo-400 w-12">Set ${j+1}</span>
                <span>${set.reps} reps</span>
                <span>${set.weight} kg</span>
              </div>`).join('')}
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleHistory(i) {
  const detail = document.getElementById(`hist-detail-${i}`);
  const arrow  = document.getElementById(`hist-arrow-${i}`);
  detail.classList.toggle('hidden');
  arrow.style.transform = detail.classList.contains('hidden') ? '' : 'rotate(180deg)';
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'fixed top-5 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-5 py-3 rounded-full text-sm font-semibold shadow-xl z-50';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.transition='opacity 0.3s'; t.style.opacity='0'; setTimeout(() => t.remove(), 300); }, 2000);
}

showScreen('home');
</script>
</body>
</html>
